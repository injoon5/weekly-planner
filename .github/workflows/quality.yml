name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
        env:
          VITE_INSTANT_APP_ID: 00000000-0000-0000-0000-000000000000
          INSTANT_APP_ID: 00000000-0000-0000-0000-000000000000
