<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>주간 계획표 · Weekly Planner</title>
<meta name="description" content="주간 시간표 · Weekly Planner">
<meta property="og:title" content="주간 계획표 · Weekly Planner">
<meta property="og:description" content="실시간으로 함께 쓰는 주간 시간표">
<meta property="og:type" content="website">
<meta property="og:locale" content="ko_KR">
<meta name="twitter:card" content="summary">
<meta name="theme-color" content="#F6F6F7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="주간 계획표">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<script>
/* apply the saved theme before first paint to avoid a flash */
try{
  var _t = localStorage.getItem('weekly-planner.theme');
  if (_t !== 'dark' && _t !== 'light'){
    var _s = JSON.parse(localStorage.getItem('weekly-planner.v2') || 'null');
    _t = _s && _s.theme;
  }
  if (_t !== 'dark' && _t !== 'light') _t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.dataset.theme = _t;
  /* sync browser chrome before first paint too — React re-syncs it on toggle */
  if (_t === 'dark'){
    var _m = document.querySelector('meta[name="theme-color"]');
    if (_m) _m.content = '#131316';
  }
}catch(e){}
/* iOS Safari auto-zooms the page when focusing inputs; maximum-scale=1 stops that
   (pinch zoom still works — Safari ignores the cap for user gestures). iOS only,
   so Android keeps full zoom control. */
try{
  if (/iP(hone|ad|od)/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)){
    var _v = document.querySelector('meta[name="viewport"]');
    if (_v) _v.content += ', maximum-scale=1';
  }
}catch(e){}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
</head>
<body>
<div id="app"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
